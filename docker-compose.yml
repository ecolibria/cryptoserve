# Development only — DO NOT use in production. See docker-compose.production.yml
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cryptoserve
      POSTGRES_USER: cryptoserve
      POSTGRES_PASSWORD: localdev
    ports:
      # Bind to loopback only -- dev databases should not be reachable from LAN.
      - "127.0.0.1:5433:5432"  # 5433 avoids conflicts with a local PostgreSQL
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cryptoserve"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      # Loopback bind: dev backend not reachable from LAN. Uvicorn still
      # listens on 0.0.0.0 inside the container -- required for Docker
      # network reachability via the port mapping.
      - "127.0.0.1:8003:8003"
    environment:
      DATABASE_URL: postgresql+asyncpg://cryptoserve:localdev@postgres:5432/cryptoserve
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      CRYPTOSERVE_MASTER_KEY: ${CRYPTOSERVE_MASTER_KEY:-650c3daddd7c6efee7f5cdb3a4645a497b6132643d93f3c007d7e99a87155993}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2}
      FRONTEND_URL: http://localhost:3003
      BACKEND_URL: http://localhost:8003
      DEV_MODE: "true"
      STARTUP_VALIDATION_LEVEL: skip
      # Listen on all container interfaces -- required for the host port
      # mapping above to forward traffic. Host-side binding is restricted
      # to 127.0.0.1, so the dev backend is NOT reachable from the LAN.
      UVICORN_HOST: ${UVICORN_HOST:-0.0.0.0}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: sh -c "exec uvicorn app.main:app --host $$UVICORN_HOST --port 8003 --reload"

  frontend:
    build: ./frontend
    ports:
      # Loopback bind -- dev frontend not reachable from LAN.
      - "127.0.0.1:3003:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8003
      # Server-side API URL for Next.js rewrites (container-to-container)
      API_URL: http://backend:8003
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  postgres_data:
